<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<a href="practicework.html"> <img src="images/lefticon.png" width="2%"> </a>
<style>
  .pic
{
  width:10%;
  position:absolute;
  top:0px;
  left:0px;
}
</style>
<img id="bird" src="images/bird.gif" class="pic">

<body>
  <script>
    var bird=document.getElementById("bird")
    var k=t=L=0
    var s=5

    function myaction(e)
    {
    k=e.keyCode

    switch(k)
    {
      case 39:
      L=L+s
      if(L>=0)
    {
      bird.style.left=L+"px"
      bird.style.transform="rotate(0deg)"
      document.title=L
    }
    break;


    case 37:
      bird.style.transform="rotate(180deg)"
      bird.style.transform="rotateY(180deg)"
      L=L-s
      if(L<window.innerWidth)
    {
      bird.style.left = L+"px"
      document.title = L
    }
    break;

    
    case 40:
    t=t+s
    if(t<window.innerHeight)
    {
      bird.style.top = t+"px"
      document.title = t
    }
    break;
     
     case 38:
      if(t>0)
    {
      t=t-s
      bird.style.top = t+"px"
      document.title = t
    }
    break;

    case 32:
      s=s+1
      document.title = s
      break;
    }


  }
    document.addEventListener("keydown",myaction)
  </script>
</body>
</html>
