<style>

@keyframes showadd
{
30%{background-image:url(images/a2.mp4);}
}



@keyframes multicolor
{
10%{color:orange}
20%{color:white}
30%{color:green}
40%{color:pink}
50%{color:brown}
60%{color:yellow}
70%{color:cyan}
80%{color:lime}
90%{color:teal}
100%{color:blue}
}


#banner{
width:90%;
height:500px;
box-shadow:10px 10px 10px gray;
margin:auto;
background-image:url(images/close.PNG);
background-size:100% 100%;
animation:showadd 5s infinite;
}


#topad{
color:red;
font-size:50px;
font-family:georgia;
text-tranform:uppercase;
box-shadow:10px 10px 10px black;
animation:multicolor 12s infinite;
}
</style>


<body>

<div id="banner">
		<div id="topad">
               welcome
		</div>
</div>


</body>
