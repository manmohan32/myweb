<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript</title>
</head>
<body>
    <script language="Javascript" type="text/javascript">
    /* Creating Element (tag) Dynamically */
    var d = document.createElement ("div")  
    document.body.appendChild(d) 
    d.classList.add("mystyle")
    d.style="padding:30px;text-align:center;color:green;"
    d.style.width="500px"
    d.style.height="auto"
    d.style.background="red"
    d.style.boxShadow= "10px 10px 10px gray" 
    d.innerHTML ="<h1>Welcome to JavaScript</h1> <img src='images/aa.jpeg' width='60%' />"
    </script>
</body>
</html>
